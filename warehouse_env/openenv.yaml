name: warehouse_env
version: 0.2.0
description: Adaptive warehouse order fulfillment with natural-language instructions, deadlines, and self-improving planning.
entrypoint: warehouse_env.server.app:app
type: http
spec_version: "1.0"
tasks:
  - id: simple_order
    name: "Simple Order"
    description: "One short natural-language order with two items, no dependencies, and a small 5x5 grid."
  - id: multi_step_order
    name: "Multi-Step Order"
    description: "A single multi-phase order with four items, dependencies, priorities, and delivery constraints."
  - id: order_queue
    name: "Order Queue"
    description: "Three sequential orders on a medium grid, requiring repeated plan-decompose-deliver cycles."
  - id: adaptive_fulfillment
    name: "Adaptive Fulfillment"
    description: "Five orders with dynamic arrivals, deadlines, dependencies, and occasional stock shortages on a 15x15 grid."
