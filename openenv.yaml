name: warehouse_env
version: 0.1.0
description: A warehouse logistics environment for LLM agents simulating automated order picking operations.
entrypoint: server.app:app
type: http
spec_version: "1.0"
tasks:
  - id: easy_picking
    name: "Easy Picking Task"
    description: "Navigate a small 5x5 warehouse area with minimal obstacles to pick up 2 items."
  - id: medium_picking
    name: "Medium Picking Task"
    description: "Navigate a standard 10x10 warehouse area with obstacles to pick up 5 items."
  - id: hard_picking
    name: "Hard Picking Task"
    description: "Navigate a larger 15x15 warehouse zone with many complex obstacles to pick up 10 items."
